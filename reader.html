<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Material Reader - CogniBridge AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/dyslexia.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">CogniBridge AI</h1>
            <p class="tagline">Study Material Reader</p>
            <div class="accessibility-controls">
                <button id="theme-toggle" class="control-btn">🌙 Theme</button>
                <button id="font-increase" class="control-btn">🔍+</button>
                <button id="font-decrease" class="control-btn">🔍-</button>
                <button id="dyslexia-toggle" class="control-btn">📖 Dyslexia</button>
                <button id="contrast-toggle" class="control-btn">🎨 Contrast</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <section class="panel reader-panel full-width">
                <h2>📖 Study Material Reader</h2>
                <div class="controls">
                    <input type="file" id="file-input" accept=".pdf,.txt" class="file-input">
                    <button id="upload-btn" class="btn primary">Upload & Read</button>
                    <button id="stop-reading" class="btn secondary">Stop Reading</button>
                </div>
                <div id="reader-content" class="reader-content"></div>
                <div class="reader-controls">
                    <button id="play-pause" class="btn small">▶️ Play</button>
                    <label for="reading-rate">Speed:</label>
                    <input type="range" id="reading-rate" min="0.5" max="2" step="0.1" value="1">
                    <span id="reading-rate-value">1x</span>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2025 CogniBridge AI. <a href="index.html">Back to Main</a></p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/reader.js"></script>
</body>
</html>
